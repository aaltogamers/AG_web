name: Build docker image and deploy to Azure App Service
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'infra/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Log in to ACR
        run: |
          ACR_NAME="${REGISTRY_LOGIN_SERVER%%.*}"
          az acr login --name "$ACR_NAME"
        env:
          REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}

      - name: Build and push image
        run: |
          docker build . -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/ag-web-container:latest
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/ag-web-container:latest

      - name: Restart Azure Web App
        run: |
          az webapp restart \
            --name ${{ secrets.WEBAPP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }}
